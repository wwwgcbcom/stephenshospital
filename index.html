<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Management System</title>
  <!-- Link your CSS file here or paste the CSS inside <style> -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Login Section -->
  <section id="loginSection">
    <div id="loginForm" class="login-card">
      <h2>Login</h2>
      <input type="text" placeholder="Username" />
      <input type="password" placeholder="Password" />
      <button class="sign-in-btn" onclick="enterHMS()">Sign In</button>
    </div>
    <div id="lampGlow"></div>
    <button onclick="toggleLamp()">Toggle Lamp</button>
  </section>

  <!-- Sidebar (example) -->
  <div id="sidebar" class="sidebar">
    <!-- Your sidebar content here -->
  </div>

  <!-- Main content sections -->
  <div class="main-content">
    <div class="section active" id="dashboard">Dashboard content here</div>
    <div class="section" id="patients">Patients content here</div>
    <div class="section" id="doctors">Doctors content here</div>
    <div class="section" id="appointments">Appointments content here</div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="addApptModal" onclick="closeModalOutside(event, 'addApptModal')">
    <div class="modal">
      <div class="modal-header">
        <h3>Book Appointment</h3>
        <button onclick="closeModal('addApptModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Patient</label>
          <select>
            <option>James Kweku</option>
            <option>Ama Boateng</option>
            <option>Kwame Asante</option>
          </select>
        </div>
        <div class="form-group">
          <label>Doctor</label>
          <select>
            <option>Dr. Mensah</option>
            <option>Dr. Ofori</option>
            <option>Dr. Sharma</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date</label>
            <input type="date" />
          </div>
          <div class="form-group">
            <label>Time</label>
            <input type="time" />
          </div>
        </div>
        <div class="form-group">
          <label>Type</label>
          <select>
            <option>Consultation</option>
            <option>Follow-up</option>
            <option>Surgery</option>
            <option>Emergency</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('addApptModal')">Cancel</button>
        <button class="btn-primary">Book Now</button>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    // Section navigation
    function showSection(id, el) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (el) el.classList.add('active');
      const titles = {
        dashboard: 'Dashboard Overview', patients: 'Patient Registry',
        doctors: 'Medical Staff', appointments: 'Appointment Scheduler',
        wards: 'Wards & Bed Management', pharmacy: 'Pharmacy Inventory',
        billing: 'Billing & Invoices', reports: 'Reports & Analytics'
      };
      document.getElementById('topbar-title').textContent = titles[id] || '';
      if (window.innerWidth < 900) document.getElementById('sidebar').classList.remove('open');
      return false;
    }

    // Modals
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function closeModalOutside(e, id) { if (e.target.classList.contains('modal-overlay')) closeModal(id); }

    // Sidebar toggle
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    // Clock
    function updateTime() {
      const now = new Date();
      document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }
    updateTime(); setInterval(updateTime, 1000);

    // Lamp toggle
    let isOn = false;
    function toggleLamp() {
      isOn = !isOn;
      const loginForm = document.getElementById('loginForm');
      const glow = document.getElementById('lampGlow');

      if (isOn) {
        loginForm.style.opacity = "1";
        glow.style.boxShadow = "0 0 50px 20px rgba(255, 255, 100, 0.5)";
        gsap.to("body", { backgroundColor: "#1c1f24", duration: 0.6 });
      } else {
        loginForm.style.opacity = "0.2";
        glow.style.boxShadow = "0 0 0px yellow";
        gsap.to("body", { backgroundColor: "#121417", duration: 0.6 });
      }
    }

    // Enter HMS (hide login)
    function enterHMS() {
      const loginScreen = document.getElementById('loginSection');
      gsap.to(loginScreen, { opacity: 0, duration: 0.5, onComplete: () => {
        loginScreen.style.display = 'none';
      }});
    }
  </script>
</body>
</html>
