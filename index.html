<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEPHEN'S HMS — Hospital Management System</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

<!-- START LOGIN SECTION -->
<div id="loginSection">
  <div class="login-container">
    <!-- The Lamp -->
    <div class="lamp" onclick="toggleLamp()">
        <div id="lampGlow"></div>
        <div class="lamp-pole"></div>
        <p>CLICK TO LIGHT</p>
    </div>

    <!-- The Login Card -->
    <div id="loginForm">
      <h2>Welcome</h2>
      <div class="login-field">
        <label>Username</label>
        <input type="text" placeholder="ilmah">
      </div>
      
      <div class="login-field">
        <label>Password</label>
        <input type="password" placeholder="••••••••">
      </div>
      
      <button onclick="enterHMS()" class="sign-in-btn">Sign In</button>
    </div>
  </div>
</div>
<!-- END LOGIN SECTION -->

<!-- ===== SIDEBAR NAV ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <span class="logo-icon">⊕</span>
    <span class="logo-text">STEPHEN'S<em>HMS</em></span>
    <!-- Mobile Close Button -->
    <button class="mobile-only-close" onclick="toggleSidebar()">✕</button>
  </div>
  <nav class="sidebar-nav">
    <a href="#dashboard" class="nav-item active" onclick="showSection('dashboard',this)">
      <span class="nav-icon">◈</span><span>Dashboard</span>
    </a>
    <a href="#patients" class="nav-item" onclick="showSection('patients',this)">
      <span class="nav-icon">◉</span><span>Patients</span>
    </a>
    <a href="#doctors" class="nav-item" onclick="showSection('doctors',this)">
      <span class="nav-icon">✦</span><span>Doctors</span>
    </a>
    <a href="#appointments" class="nav-item" onclick="showSection('appointments',this)">
      <span class="nav-icon">◫</span><span>Appointments</span>
    </a>
    <a href="#wards" class="nav-item" onclick="showSection('wards',this)">
      <span class="nav-icon">▦</span><span>Wards & Beds</span>
    </a>
    <a href="#pharmacy" class="nav-item" onclick="showSection('pharmacy',this)">
      <span class="nav-icon">⬡</span><span>Pharmacy</span>
    </a>
    <a href="#billing" class="nav-item" onclick="showSection('billing',this)">
      <span class="nav-icon">◪</span><span>Billing</span>
    </a>
    <a href="#reports" class="nav-item" onclick="showSection('reports',this)">
      <span class="nav-icon">▤</span><span>Reports</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-avatar">AD</div>
    <div class="user-info">
      <span class="user-name">Dr. Admin</span>
      <span class="user-role">Super Admin</span>
    </div>
    <!-- FIXED LOGOUT BUTTON -->
    <span class="logout-btn" onclick="logoutHMS()">⏻</span>
  </div>
</aside>

<!-- ===== MAIN CONTENT ===== -->
<main class="main-content">
  <header class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div class="topbar-title" id="topbar-title">Dashboard Overview</div>
    <div class="topbar-actions">
      <div class="search-wrap">
        <input type="text" placeholder="Search..." class="search-input" />
        <span class="search-icon">⌕</span>
      </div>
      <div class="current-time" id="currentTime"></div>
    </div>
  </header>

  <section class="section active" id="dashboard">
    <div class="section-header">
      <h1>Good Morning, <em>Dr. Boadi</em></h1>
      <p class="section-sub">Hospital Management System</p>
    </div>

    <!-- Your existing stats and cards go here -->
    <div class="stats-grid">
        <div class="stat-card accent-teal">
            <div class="stat-icon">◉</div>
            <div class="stat-info"><span class="stat-num">1,284</span><span class="stat-label">Patients</span></div>
        </div>
        <div class="stat-card accent-blue">
            <div class="stat-icon">✦</div>
            <div class="stat-info"><span class="stat-num">96</span><span class="stat-label">Doctors</span></div>
        </div>
    </div>
  </section>
</main>

<script>
  // 1. Navigation Logic
  function showSection(id, el) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (el) el.classList.add('active');
    
    // Auto-close sidebar on mobile
    if (window.innerWidth <= 900) {
        document.getElementById('sidebar').classList.remove('open');
    }
  }

  // 2. Sidebar Toggle for Mobile
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  // 3. Login Lamp Toggle
  let isOn = false;
  function toggleLamp() {
    isOn = !isOn;
    const loginForm = document.getElementById('loginForm');
    const glow = document.getElementById('lampGlow');
    if (isOn) {
      loginForm.style.opacity = "1";
      loginForm.style.pointerEvents = "all";
      glow.style.boxShadow = "0 0 60px 20px rgba(255, 255, 150, 0.6)";
      glow.style.background = "#fff";
    } else {
      loginForm.style.opacity = "0.2";
      loginForm.style.pointerEvents = "none";
      glow.style.boxShadow = "none";
      glow.style.background = "#333";
    }
  }

  // 4. Enter HMS
  function enterHMS() {
    const loginScreen = document.getElementById('loginSection');
    gsap.to(loginScreen, { y: "-100%", duration: 0.7, ease: "power2.inOut", onComplete: () => {
        loginScreen.style.display = 'none';
    }});
  }

  // 5. LOGOUT LOGIC (Back to Login Screen)
  function logoutHMS() {
    const loginScreen = document.getElementById('loginSection');
    loginScreen.style.display = 'flex';
    gsap.fromTo(loginScreen, { y: "-100%" }, { y: "0%", duration: 0.7, ease: "power2.out" });
    
    // Reset lamp state for security feel
    isOn = false;
    toggleLamp();
  }

  // Clock
  setInterval(() => {
    const now = new Date();
    document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
  }, 1000);
</script>

</body>
</html>
